services:
  # =============================================
  # Firebase Emulators (Auth + Firestore)
  # =============================================
  firebase-emulator:
    image: node:20-alpine
    container_name: firebase-emulator
    working_dir: /emulators
    ports:
      - "4001:4001"
      - "8080:8080"
      - "9099:9099"
    volumes:
      - ./firebase.json:/emulators/firebase.json
      - ./firestore.rules:/emulators/firestore.rules
    command: sh -c "npm install -g firebase-tools@latest && firebase emulators:start --project=demo-project"
    restart: unless-stopped
    profiles:
      - prod
      - dev

  # =============================================
  # Next.js App (Production build via Dockerfile)
  # =============================================
  app:
    build:
      context: .
      args:
        - DOCKER_BUILD=true
    image: nextn-app
    container_name: nextn-app
    depends_on:
      - firebase-emulator
    ports:
      - "9002:9002"
    environment:
      - NODE_ENV=production
      - PORT=9002
      - NEXT_PUBLIC_USE_EMULATOR=true
      - NEXT_PUBLIC_EMULATOR_HOST=firebase-emulator
      - FIREBASE_EMULATOR_HOST=firebase-emulator:9099
      - NEXT_PUBLIC_FIREBASE_API_KEY=demo-api-key
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=demo.firebaseapp.com
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=demo-project
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=demo.appspot.com
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=000000000000
      - NEXT_PUBLIC_FIREBASE_APP_ID=1:000000000000:web:0000000000000000
      - GOOGLE_GENAI_API_KEY=${GOOGLE_GENAI_API_KEY:-}
      - FIREBASE_SERVICE_ACCOUNT_KEY=${FIREBASE_SERVICE_ACCOUNT_KEY:-}
    restart: unless-stopped
    profiles:
      - prod

  # =============================================
  # Next.js App (Development with hot reload)
  # =============================================
  app-dev:
    image: node:20-alpine
    container_name: nextn-dev
    depends_on:
      - firebase-emulator
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "9002:9002"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_USE_EMULATOR=true
      - NEXT_PUBLIC_EMULATOR_HOST=firebase-emulator
      - FIREBASE_EMULATOR_HOST=firebase-emulator:9099
      - NEXT_PUBLIC_FIREBASE_API_KEY=demo-api-key
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=demo.firebaseapp.com
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=demo-project
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=demo.appspot.com
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=000000000000
      - NEXT_PUBLIC_FIREBASE_APP_ID=1:000000000000:web:0000000000000000
      - GOOGLE_GENAI_API_KEY=${GOOGLE_GENAI_API_KEY:-}
      - FIREBASE_SERVICE_ACCOUNT_KEY=${FIREBASE_SERVICE_ACCOUNT_KEY:-}
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    profiles:
      - dev

  # =============================================
  # Genkit AI Development Server
  # =============================================
  genkit-dev:
    image: node:20-alpine
    container_name: nextn-genkit
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "4000:4000"
    environment:
      - GOOGLE_GENAI_API_KEY=${GOOGLE_GENAI_API_KEY:-}
    command: sh -c "npm install && npx genkit start -- tsx src/ai/dev.ts"
    restart: unless-stopped
    profiles:
      - genkit
