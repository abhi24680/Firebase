services:
  # =============================================
  # Next.js App (Production build via Dockerfile)
  # =============================================
  app:
    build:
      context: .
      args:
        - DOCKER_BUILD=true
    image: nextn-app
    container_name: nextn-app
    ports:
      - "9002:9002"
    environment:
      - NODE_ENV=production
      - PORT=9002
      - DATABASE_URL=postgresql://postgres:Abhijith%40123@db.gturbyvxjbsmfbyqtbjy.supabase.co:5432/postgres
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY:-}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY:-}
      - SUPABASE_JWKS_URL=${SUPABASE_JWKS_URL:-}
    restart: unless-stopped
    profiles:
      - prod

  # =============================================
  # Next.js App (Development with hot reload)
  # =============================================
  app-dev:
    image: node:20-alpine
    container_name: nextn-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "9002:9002"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:Abhijith%40123@db.gturbyvxjbsmfbyqtbjy.supabase.co:5432/postgres
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY:-}
      - SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY:-}
      - SUPABASE_JWKS_URL=${SUPABASE_JWKS_URL:-}
    command: sh -c "npm install && npx prisma generate && npm run dev"
    restart: unless-stopped
    profiles:
      - dev
