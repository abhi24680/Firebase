<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.08); }
      }
      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 2px #3b82f6); }
        50% { filter: drop-shadow(0 0 8px #3b82f6) drop-shadow(0 0 12px #06b6d4); }
      }
      @keyframes draw {
        from { stroke-dashoffset: 40; }
        to { stroke-dashoffset: 0; }
      }
      .e-letter {
        animation: pulse 2s ease-in-out infinite, glow 2s ease-in-out infinite;
      }
      .e-stroke {
        fill: none;
        stroke: url(#g);
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 40;
        animation: draw 1.5s ease-out forwards;
      }
    </style>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0a0a0f"/>
  <g class="e-letter">
    <rect x="4" y="4" width="24" height="24" rx="4" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.3"/>
    <path class="e-stroke" d="M10 16h12M10 10h8M10 22h8"/>
  </g>
</svg>
